name: Publish to NuGet

# Publishes the plugin to nuget.org when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Authentication uses nuget.org Trusted Publishing (OIDC) — no stored API key.
# Prerequisites (one-time):
#   1. On nuget.org -> Trusted Publishing, add a policy:
#        Repository Owner: badrshs
#        Repository:       GitExtensions.AICommitMessage
#        Workflow File:    release.yml
#        Environment:      (leave blank)
#   2. In this GitHub repo, add an Actions VARIABLE named NUGET_USER set to your
#      nuget.org username (your profile name, NOT your email).

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # CI runners don't have Git Extensions installed, so fetch the matching
      # binaries (the plugin compiles against them; they are not redistributed).
      - name: Download Git Extensions 5.2.1 binaries
        shell: pwsh
        run: |
          $url = "https://github.com/gitextensions/gitextensions/releases/download/v5.2.1/GitExtensions-Portable-x64-5.2.1.18061-0d74cfdc3.zip"
          Invoke-WebRequest -Uri $url -OutFile ge.zip
          Expand-Archive -Path ge.zip -DestinationPath ge -Force
          $dll = Get-ChildItem -Path ge -Recurse -Filter GitExtensions.Extensibility.dll | Select-Object -First 1
          if (-not $dll) { throw "GitExtensions.Extensibility.dll not found in the portable archive" }
          "GE_PATH=$($dll.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "GE_PATH = $($dll.Directory.FullName)"

      - name: Pack
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Packing version $version"
          dotnet pack src/GitExtensions.AICommitMessage/GitExtensions.AICommitMessage.csproj `
            -c Release `
            -p:GitExtensionsPath="$env:GE_PATH" `
            -p:Version=$version

      # Trusted Publishing keys are valid for 1 hour, so request it right before pushing.
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $pkg = "src/GitExtensions.AICommitMessage/bin/Release/GitExtensions.AICommitMessage.$version.nupkg"
          dotnet nuget push $pkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: src/GitExtensions.AICommitMessage/bin/Release/*.nupkg
